<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 1024 1024">
  <!-- No filled background: the toolbar renders this icon as a masked/tinted
       silhouette from its opaque shape, so a full-canvas background here
       (as we had before) masked out as one solid block instead of a glyph. -->

  <!-- Flat route line across the middle -->
  <rect x="90" y="482" width="844" height="60" rx="30" fill="#FFFFFF"/>

  <!-- Stop ring: two nested circles with evenodd fill so the center is a
       true transparent hole rather than a punched-out background color. -->
  <path fill-rule="evenodd" clip-rule="evenodd" fill="#FFFFFF"
        d="M518,512 A118,118 0 1,0 282,512 A118,118 0 1,0 518,512 Z
           M462,512 A62,62 0 1,0 338,512 A62,62 0 1,0 462,512 Z"/>

  <!-- Mouse cursor on the right, overlapping the line -->
  <g transform="translate(640,400) scale(17)">
    <path d="M0 0 L0 17.5 L4.7 13.6 L7.3 19.6 L10.6 18.2 L8 12.3 L14 12.3 Z" fill="#FFFFFF"/>
  </g>
</svg>
